name: Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Salesforce CLI with NPM
        run: |
            npm install @salesforce/cli --global      

      - name: Authenticate to Salesforce
        run: |
            echo "${{secrets.SFDXAUTH_URL}}" | sf org login sfdx-url --alias orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com --set-default --sfdx-url-stdin

      - name: Deploy to Salesforce
        run: |
            sf project deploy start --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com --wait 30