name: Deploy to Salesforce

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ✅ Forces Node.js 24 for all actions (fixes deprecation warning)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full Git history required for delta comparison

      # ─────────────────────────────────────────────
      # INSTALL TOOLS
      # ─────────────────────────────────────────────
      - name: Install Salesforce CLI
        run: |
          echo "📦 Installing Salesforce CLI..."
          npm install @salesforce/cli --global
          echo "✅ SF CLI version: $(sf --version)"

      - name: Install sfdx-git-delta Plugin
        run: |
          echo "📦 Installing sfdx-git-delta plugin..."
          echo 'y' | sf plugins install sfdx-git-delta
          echo "✅ SGD version: $(sf sgd --version 2>/dev/null || echo 'installed')"

      # ─────────────────────────────────────────────
      # AUTHENTICATE
      # ─────────────────────────────────────────────
      - name: Authenticate to Salesforce
        run: |
          echo "🔐 Authenticating to Salesforce org..."

          # Verify secret is not empty before attempting auth
          if [ -z "${{ secrets.SFDX_AUTH_URL }}" ]; then
            echo "❌ ERROR: SFDX_AUTH_URL secret is empty or not set!"
            exit 1
          fi

          echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url \
            --alias orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
            --set-default \
            --sfdx-url-stdin

          echo "✅ Authentication successful!"
          sf org display --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com

      # ─────────────────────────────────────────────
      # RESOLVE COMMIT SHAs
      # ─────────────────────────────────────────────
      - name: Get Previous and Current Commit SHAs
        run: |
          CURRENT_SHA="${{ github.sha }}"
          PREVIOUS_SHA="${{ github.event.before }}"

          echo "🔍 Raw SHAs from GitHub event:"
          echo "   CURRENT_SHA  = $CURRENT_SHA"
          echo "   PREVIOUS_SHA = $PREVIOUS_SHA"

          # Fallback: if first push to branch, PREVIOUS_SHA is all zeros
          if [[ "$PREVIOUS_SHA" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS_SHA=$(git rev-list --max-parents=0 HEAD)
            echo "⚠️  First push detected — using root commit as baseline: $PREVIOUS_SHA"
          fi

          echo "CURRENT_SHA=$CURRENT_SHA"   >> $GITHUB_ENV
          echo "PREVIOUS_SHA=$PREVIOUS_SHA" >> $GITHUB_ENV

          echo "✅ Final SHAs:"
          echo "   FROM : $PREVIOUS_SHA"
          echo "   TO   : $CURRENT_SHA"

          # Show what files changed between the two commits
          echo ""
          echo "📋 Files changed in this push:"
          git diff --name-only "$PREVIOUS_SHA" "$CURRENT_SHA" || echo "⚠️ Could not list changed files"

      # ─────────────────────────────────────────────
      # GENERATE DELTA PACKAGE
      # ─────────────────────────────────────────────
      - name: Generate Delta Metadata Package
        run: |
          echo "⚙️  Generating delta metadata package..."
          echo "   FROM : $PREVIOUS_SHA"
          echo "   TO   : $CURRENT_SHA"

          mkdir -p delta

          sf sgd source delta \
            --to "$CURRENT_SHA" \
            --from "$PREVIOUS_SHA" \
            --repo . \
            --output-dir delta \
            --source-dir force-app

          echo "✅ Delta generation complete!"
          echo ""
          echo "📁 Delta folder contents:"
          find delta -type f | sort  # List all generated files for visibility

      # ─────────────────────────────────────────────
      # DISPLAY DELTA CONTENTS (DEBUGGING)
      # ─────────────────────────────────────────────
      - name: Display Delta Package
        run: |
          echo "========================================"
          echo "=== package.xml ==="
          echo "========================================"
          if [ -f delta/package/package.xml ]; then
            cat delta/package/package.xml
          else
            echo "⚠️  delta/package/package.xml not found!"
          fi

          echo ""
          echo "========================================"
          echo "=== destructiveChanges.xml (if any) ==="
          echo "========================================"
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            cat delta/destructiveChanges/destructiveChanges.xml
          else
            echo "ℹ️  No destructive changes found."
          fi

      # ─────────────────────────────────────────────
      # DEPLOY DELTA CHANGES
      # ─────────────────────────────────────────────
      - name: Deploy Delta Changes to Salesforce
        run: |
          if [ -s delta/package/package.xml ]; then
            echo "🚀 Deploying delta metadata to Salesforce..."
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/package/package.xml \
              --wait 30
            echo "✅ Deployment complete!"
          else
            echo "ℹ️  No metadata changes detected. Skipping deployment."
          fi

      # ─────────────────────────────────────────────
      # DEPLOY DESTRUCTIVE CHANGES (DELETIONS)
      # ─────────────────────────────────────────────
      - name: Deploy Destructive Changes
        run: |
          if [ -s delta/destructiveChanges/destructiveChanges.xml ]; then
            echo "🗑️  Deploying destructive changes (deletions) to Salesforce..."
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/destructiveChanges/destructiveChanges.xml \
              --pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
              --wait 30
            echo "✅ Destructive changes deployed!"
          else
            echo "ℹ️  No destructive changes detected. Skipping."
          fi