name: Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4        # ✅ Upgraded from v3 → v4 (Node.js 24 compatible)
        with:
          fetch-depth: 0                 # Fetch full Git history to compare commits for delta changes

      - name: Install Salesforce CLI with NPM
        run: |
          npm install @salesforce/cli --global

      - name: Install sfdx-git-delta Plugin
        run: |
          echo 'y' | sf plugins install sfdx-git-delta  # Plugin that generates delta metadata between commits

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url \
            --alias orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
            --set-default \
            --sfdx-url-stdin

      - name: Get Previous and Current Commit SHAs
        run: |
          CURRENT_SHA="${{ github.sha }}"
          PREVIOUS_SHA="${{ github.event.before }}"

          # Fallback: if first push ever, compare against root commit
          if [[ "$PREVIOUS_SHA" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS_SHA=$(git rev-list --max-parents=0 HEAD)
            echo "First push detected — using root commit as baseline: $PREVIOUS_SHA"
          fi

          echo "CURRENT_SHA=$CURRENT_SHA"   >> $GITHUB_ENV
          echo "PREVIOUS_SHA=$PREVIOUS_SHA" >> $GITHUB_ENV
          # github.sha          = the latest commit SHA (HEAD) triggered by this push
          # github.event.before = the commit SHA just before this push (baseline for comparison)

      - name: Generate Delta Metadata Package
        run: |
          mkdir -p delta  # Create output folder to store delta metadata
          sf sgd source delta \
            --to "$CURRENT_SHA" \
            --from "$PREVIOUS_SHA" \
            --repo . \
            --output-dir delta \
            --source-dir force-app  # Only scan force-app folder for Salesforce metadata changes
          # sf sgd source delta = correct command when sfdx-git-delta is installed as SF CLI plugin
          # --to         : end commit (latest)
          # --from       : start commit (previous)
          # --repo       : current repo directory
          # --output-dir : folder to write the delta package.xml and metadata
          # --source-dir : your Salesforce source folder

      - name: Display Delta Package (for Debugging)
        run: |
          echo "=== package.xml ===" 
          cat delta/package/package.xml       # Shows exactly which components will be deployed
          echo ""
          echo "=== destructiveChanges.xml (if any) ==="
          cat delta/destructiveChanges/destructiveChanges.xml 2>/dev/null || echo "No destructive changes"
          # destructiveChanges.xml lists components deleted in Git that should be removed from the org

      - name: Deploy Delta Changes to Salesforce
        run: |
          if [ -s delta/package/package.xml ]; then  # Only deploy if package.xml is non-empty
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/package/package.xml \
              --wait 30
          else
            echo "No metadata changes detected. Skipping deployment."
          fi

      - name: Deploy Destructive Changes (Deleted Components)
        run: |
          if [ -s delta/destructiveChanges/destructiveChanges.xml ]; then  # Only run if deletions exist
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/destructiveChanges/destructiveChanges.xml \
              --pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
              --wait 30
          else
            echo "No destructive changes detected. Skipping."
          fi