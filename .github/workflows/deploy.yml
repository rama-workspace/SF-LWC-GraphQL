name: Deploy to Salesforce

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Salesforce CLI with NPM
        run: npm install -g sfdx-cli        

      - name: Authenticate to Salesforce
        env:
          SFDX_AUTH_URL: ${{ secrets.SFDX_AUTH_URL }}
        run: sfdx auth:sfdxurl:store --sfdxurlfile <(echo "$SFDX_AUTH_URL")

      - name: Deploy to Salesforce
        run: sfdx force:source:deploy -p force-app --targetusername ${{ secrets.SALESFORCE_USERNAME }} --wait 10