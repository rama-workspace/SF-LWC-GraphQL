name: Deploy to Salesforce

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Install sfdx-git-delta
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Authenticate to Salesforce
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" | sf org login sfdx-url \
            --alias orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
            --set-default \
            --sfdx-url-stdin

      - name: Resolve Commit SHAs
        run: |
          CURRENT_SHA="${{ github.sha }}"
          PREVIOUS_SHA="${{ github.event.before }}"

          # First push to branch has no previous commit — fallback to root commit
          if [[ "$PREVIOUS_SHA" == "0000000000000000000000000000000000000000" ]]; then
            PREVIOUS_SHA=$(git rev-list --max-parents=0 HEAD)
            echo "⚠️ First push — using root commit: $PREVIOUS_SHA"
          fi

          echo "FROM : $PREVIOUS_SHA"
          echo "TO   : $CURRENT_SHA"

          echo "CURRENT_SHA=$CURRENT_SHA"   >> $GITHUB_ENV
          echo "PREVIOUS_SHA=$PREVIOUS_SHA" >> $GITHUB_ENV

      - name: Generate Delta Package
        run: |
          mkdir -p delta
          sf sgd source delta \
            --to   "$CURRENT_SHA" \
            --from "$PREVIOUS_SHA" \
            --repo . \
            --output-dir delta \
            --source-dir force-app

          echo "📋 Generated package.xml:"
          cat delta/package/package.xml 2>/dev/null || echo "No package.xml generated"

          echo ""
          echo "📋 Generated destructiveChanges.xml:"
          cat delta/destructiveChanges/destructiveChanges.xml 2>/dev/null || echo "No destructive changes"

      - name: Deploy Delta Changes
        run: |
          if [ ! -f delta/package/package.xml ]; then
            echo "ℹ️ No package.xml found. Skipping."
            exit 0
          fi

          # Count <members> tags — real components to deploy
          COMPONENT_COUNT=$(grep -c "<members>" delta/package/package.xml 2>/dev/null || echo "0")
          echo "📦 Components found in package.xml: $COMPONENT_COUNT"

          if [ "$COMPONENT_COUNT" -gt 0 ]; then
            echo "🚀 Deploying changes..."
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/package/package.xml \
              --wait 30
            echo "✅ Deployment successful!"
          else
            echo "ℹ️ package.xml is empty — nothing to deploy. Skipping."
          fi

      - name: Deploy Destructive Changes
        run: |
          if [ ! -f delta/destructiveChanges/destructiveChanges.xml ]; then
            echo "ℹ️ No destructiveChanges.xml found. Skipping."
            exit 0
          fi

          # Count <members> tags — real deletions to process
          DELETION_COUNT=$(grep -c "<members>" delta/destructiveChanges/destructiveChanges.xml 2>/dev/null || echo "0")
          echo "🗑️ Deletions found in destructiveChanges.xml: $DELETION_COUNT"

          if [ "$DELETION_COUNT" -gt 0 ]; then
            echo "🗑️ Deploying destructive changes..."
            sf project deploy start \
              --target-org orgfarm-348cfcfd79-dev-ed.develop.my.salesforce.com \
              --manifest delta/destructiveChanges/destructiveChanges.xml \
              --pre-destructive-changes delta/destructiveChanges/destructiveChanges.xml \
              --wait 30
            echo "✅ Destructive changes deployed!"
          else
            echo "ℹ️ destructiveChanges.xml is empty — nothing to delete. Skipping."
          fi