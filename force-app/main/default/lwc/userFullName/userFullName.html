<template>
    <lightning-card title="User Full Name" icon-name="standard:user">
        <lightning-input label="First Name" data-name="firstName" class="slds-m-around_small"></lightning-input>
        <lightning-input label="Last Name" data-name="lastName" class="slds-m-around_small"></lightning-input>

        <lightning-button label="Show Full Name" onclick={handleGetFullName} class="slds-m-around_small"></lightning-button>
        
        <lightning-flow flow-api-name="Rama_User_Full_Name" flow-input-variables={flowVariables} onstatuschange={handleFlowStatusChange}     if:true={isShowFlow}></lightning-flow>            
    
    </lightning-card>
</template>
